<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YomiRuby Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="container">
      <h1 id="optionsTitle">YomiRuby Settings</h1>

      <p class="description" id="optionsDescription"></p>
      <p class="description">
        <a
          id="developerPortalLink"
          href="https://developer.yahoo.co.jp/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Yahoo! JAPAN Developer Network
        </a>
      </p>

      <label for="apiKeyInput" class="field-label" id="clientIdLabel">Yahoo Client ID</label>
      <input
        id="apiKeyInput"
        type="password"
        placeholder="Paste your Yahoo Client ID"
        autocomplete="off"
      >

      <label for="demoModeCheckbox" class="checkbox-row">
        <input id="demoModeCheckbox" type="checkbox">
        <span id="offlineModeLabel">Offline mode (use local dictionary)</span>
      </label>
      <p class="description" id="offlineModeHelp"></p>

      <div class="button-row">
        <button id="testButton" type="button" class="secondary">Test Client ID</button>
        <button id="saveButton" type="button">Save Settings</button>
      </div>
      <p id="feedback" role="status" aria-live="polite"></p>

      <section class="help">
        <h2 id="howToTitle">How to get the Client ID</h2>
        <ol>
          <li id="step1"></li>
          <li id="step2"></li>
          <li id="step3"></li>
        </ol>
        <p>
          <span id="furiganaReferencePrefix">Furigana API reference:</span>
          <a
            id="furiganaReferenceLink"
            href="https://developer.yahoo.co.jp/webapi/jlp/furigana/v2/furigana.html"
            target="_blank"
            rel="noopener noreferrer"
          >
            FuriganaService V2
          </a>
        </p>
      </section>
    </main>

      <script src="utils/constants.js"></script>
      <script src="utils/i18n.js"></script>
      <script src="options.js"></script>
  </body>
</html>
